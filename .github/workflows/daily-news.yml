name: Daily News Fetch

on:
  schedule:
    # Runs every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: node scripts/fetch-news.js

      - name: Commit and push if changed
        run: |
          git config user.name "News Bot"
          git config user.email "bot@tobys-news.network"
          git add data.js data_trucking.js
          if git diff --staged --quiet; then
            echo "No new articles found"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d') daily news fetch"
            git push
          fi
